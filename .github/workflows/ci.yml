name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Check Lua syntax
        run: luac5.1 -p lua/go_mono_repo/*.lua scripts/*.lua
